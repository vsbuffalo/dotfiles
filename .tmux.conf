# ============================================================
# 1. Core
# ============================================================
set -g default-terminal "tmux-256color"
set -s escape-time 0
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g mouse on
set -g status-interval 3

# Manual window naming — C-b , to rename
setw -g automatic-rename off
set -g allow-rename off

# ============================================================
# 2. Human keybindings
# ============================================================

# C-a C-a for last window (GNU screen muscle memory)
bind-key C-a last-window

# Toggle status bar
bind-key b set-option status

# Splits — keep cwd
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Pane navigation (mirrors <A-hjkl> in neovim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resize — repeatable, uppercase to complement hjkl navigation
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Fix Emacs C-a (send prefix to inner program)
bind a send-prefix

# Reload config with confirmation
unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# vi copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Kill pane/window without confirmation
bind x kill-pane
bind X kill-window

# Cycle windows
bind -r Tab next-window
bind -r BTab previous-window

# ============================================================
# 3. Plugins (TPM)
# ============================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'Nybkox/tmux-ukiyo'
set -g @plugin 'laktak/extrakto'

# tmux-ukiyo theme (matches neovim kanagawa)
set -g @ukiyo-theme 'kanagawa/wave'
set -g @ukiyo-plugins "custom:$HOME/dotfiles/scripts/tmux-sysinfo.sh"
set -g @ukiyo-show-powerline true

# ============================================================
# 4. Notifications
# ============================================================
setw -g monitor-activity on
set -g visual-activity on
setw -g monitor-bell on
set -g bell-action any

# ============================================================
# 5. Status bar
# ============================================================
set -g status-position top

# ============================================================
# 6. Agent support
# ============================================================

# Synchronized panes — broadcast input to all panes in window
bind S setw synchronize-panes \; display-message "sync #{?pane_synchronized,ON,OFF}"

# Quick window jumps (Meta/Alt + number, no prefix needed)
# Requires terminal to send Meta (Option-as-Meta in iTerm2/Alacritty)
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5

# ============================================================
# Initialize TPM (keep at bottom)
# ============================================================
run '~/.tmux/plugins/tpm/tpm'

# Overrides after TPM (ukiyo clobbers these)
set -g pane-active-border-style "fg=#98bb6c"
set -g pane-border-style "fg=#363646"
set -g window-active-style "bg=#1f1f28"
set -g window-style "bg=#1f1f28"
